extends: default.yaml

# DroidCam virtual webcam — index from `npm run probe:cameras`.
# Use 4:3 capture (not 1280×720): forcing 16:9 crops the frame vs the phone app.
# Best quality: quit DroidCam Client and set source: "droidcam:auto"
video:
  source: 1
  backend: msmf
  capture_width: 1280
  capture_height: 960
  capture_fps: 30
  frame_preprocess:
    enabled: false
  preview:
    max_fps: 30          # target preview FPS (>= the 25 we want on /live)
    max_width: 1280      # cap encode size so CPU can sustain 30 FPS
    jpeg_quality: 88     # near-lossless visually, ~30% faster encode than 96
    fit: contain

features:
  enabled:
    clip: true
    pose: false
    motion: true
    posture: false

smoothing:
  min_confidence: 0.40
  prob_ema_alpha: 0.52
  confirm_bursts: 2
  cooldown_sec: 3.0

inference:
  model_dir: data/models/latest
  overlay: true
  show_window: false
  publish_to_api: true
  snapshot_history: 60
  log_predictions: true
  predictions_log: data/logs/predictions.jsonl
  preferences_path: data/preferences.json

  # Off by default — was flipping Away→Work before you even tapped "wrong".
  live_presence_fixup:
    enabled: false

  activity_hints:
    enabled: true
    nudge_strength: 0.14
    min_margin: 0.02

  occupancy:
    enabled: false

  transitions:
    enabled: true
    dir: data/transitions
    max_entries: 200

  auto_retrain:
    enabled: true
    min_corrections: 5
    min_interval_sec: 45
    live_snapshot_instant: true
    live_snapshot_min_interval_sec: 10
    correction_row_weight: 1.0
    confirmation_row_weight: 1.0
    max_correction_rows: 60
    max_correction_weight_fraction: 0.10
    base_row_weight: 1.0
    base_features_path: data/features/multi_room_features.csv
    train_config: configs/train_multi_room.yaml
    min_test_accuracy: 0.0

  feedback:
    enabled: true
    dir: data/feedback
    influence: 0.38
    similarity_floor: 0.76
    nearest_k: 5
    max_examples: 400
    penalty_factor: 0.45
    personalization_blend: 0.45
    personal_room_influence_boost: 1.1
