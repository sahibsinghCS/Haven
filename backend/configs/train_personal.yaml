# Personal room training — feature flags MUST match configs/inference.yaml for /live.
# Inherit multi-room XGBoost regularization (shallower trees) so merging a small
# personal dataset does not overfit and degrade builtin mood accuracy.
extends: train_multi_room.yaml

training:
  output_dir: data/models/latest
  features_path: data/features/personal_features.parquet

  # Personal bursts are up-weighted vs generic multi-room rows; equalized per mood
  # at train time (see roomos.model.train._compute_train_sample_weights).
  use_row_weights: true
  default_row_weight: 12.0
