# Personal room training — feature flags MUST match configs/inference.yaml for /live.
extends: train.yaml

features:
  enabled:
    clip: true
    pose: false
    motion: true
    posture: false

training:
  output_dir: data/models/latest
  features_path: data/features/personal_features.parquet

  # Your room stills count much more than any generic prior when you merge data.
  use_row_weights: true
  default_row_weight: 12.0
