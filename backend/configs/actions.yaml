extends: default.yaml

# Room automation — safe defaults: dry_run=true (simulated).
# Live device control: set dry_run: false OR use configs/actions.live-devices.yaml
# When dry_run is false, changing room state applies Preferences to Settings devices
# (smart plug fan, thermostat temperature, Tuya lights).

actions:
  dry_run: true
  events_log: data/events/actions.jsonl
  default_cooldown_sec: 60.0
  default_min_confidence: 0.55
  default_sustain_windows: 1

  integrations:
    home_assistant:
      enabled: false
      base_url: "http://127.0.0.1:8123"
      verify_ssl: false
      timeout_sec: 8.0
      token: ""
      token_env: "HOME_ASSISTANT_TOKEN"

    # Direct Kasa plug (HS103, EP25, …) — legacy; prefer smart_plug from Settings UI
    kasa:
      enabled: false
      host: ""
      host_env: "KASA_PLUG_HOST"
      username: ""
      password: ""
      username_env: "KASA_USERNAME"
      password_env: "KASA_PASSWORD"
      timeout_sec: 10.0

    # Filled from Settings → integrations.json when devices are configured
    smart_plug:
      enabled: false
      brand: "tplink_kasa"
      host: ""

    thermostat:
      enabled: false
      brand: "none"

  rules:
    # --- Always-on: visible log lines (no external calls) -----------------
    - name: focus_mode_log
      when:
        activity: work
        min_confidence: 0.6
        sustain_windows: 1
      action:
        type: log
        message: "[focus_mode] work detected — configure HA rule to automate lights"
      cooldown_sec: 120

    - name: sleep_mode_log
      when:
        activity: sleep
        min_confidence: 0.6
        sustain_windows: 1
      action:
        type: log
        message: "[sleep_mode] sleep detected"
      cooldown_sec: 300

    - name: gaming_mode_log
      when:
        activity: gaming
        min_confidence: 0.55
        sustain_windows: 1
      action:
        type: log
        message: "[gaming_mode] gaming detected"
      cooldown_sec: 90

    # --- Real Home Assistant (opt-in) ----------------------------------
    # 1) In HA: Settings → Automations → Create → Trigger: Webhook → id: roomos_work
    # 2) Set integrations.home_assistant.enabled: true AND dry_run: false
    # 3) Set enabled: true on the rule below
    - name: focus_mode_ha
      enabled: false
      when:
        activity: work
        min_confidence: 0.6
        sustain_windows: 1
      action:
        type: home_assistant
        mode: webhook
        webhook_id: roomos_work
        data:
          scene: focus
      cooldown_sec: 180

    - name: sleep_mode_ha
      enabled: false
      when:
        activity: sleep
        min_confidence: 0.6
        sustain_windows: 1
      action:
        type: home_assistant
        mode: webhook
        webhook_id: roomos_sleep
      cooldown_sec: 300

    # --- Direct Kasa plug (opt-in; set ROOMOS_ACTIONS_CONFIG=configs/actions.kasa.yaml) ---
    - name: sleep_fan_kasa
      enabled: false
      when:
        activity: sleep
        min_confidence: 0.6
        sustain_windows: 1
      action:
        type: kasa
        state: on
      cooldown_sec: 120

    - name: work_fan_off_kasa
      enabled: false
      when:
        activity: work
        min_confidence: 0.6
        sustain_windows: 1
      action:
        type: kasa
        state: off
      cooldown_sec: 180

    # --- Settings UI smart plug (Kasa, Tuya, Shelly, Meross, Wemo) -----
    - name: sleep_fan_plug
      enabled: false
      when:
        activity: sleep
        min_confidence: 0.6
        sustain_windows: 1
      action:
        type: smart_plug
        state: on
      cooldown_sec: 120

    - name: work_fan_plug_off
      enabled: false
      when:
        activity: work
        min_confidence: 0.6
        sustain_windows: 1
      action:
        type: smart_plug
        state: off
      cooldown_sec: 180

    # --- Local demo without HA (see scripts/demo_action_receiver.py) -----
    - name: local_webhook_demo
      enabled: false
      when:
        activity: work
        min_confidence: 0.55
        sustain_windows: 1
      action:
        type: webhook
        url: "http://127.0.0.1:9999/roomos"
        method: POST
      cooldown_sec: 30
